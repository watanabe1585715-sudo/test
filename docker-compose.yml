# ローカル実行用: PostgreSQL + Go API（+ ワンショット用 batch イメージ）
# 起動: docker compose up -d --build
# 掲載反映: docker compose run --rm batch
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: recruit
      POSTGRES_PASSWORD: recruit
      POSTGRES_DB: recruit
      PGTZ: Asia/Tokyo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recruit -d recruit"]
      interval: 3s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://recruit:recruit@db:5432/recruit?sslmode=disable
      # 本番では必ず変更すること
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-change-me}
      API_ADDR: :8080
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  # 掲載ステータス更新（手動・cron 用）。`docker compose run --rm batch`
  batch:
    build: .
    entrypoint: ["/app/batch"]
    environment:
      DATABASE_URL: postgres://recruit:recruit@db:5432/recruit?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  # メールキュー送信（SMTP 設定時）。例: docker compose --profile tools run --rm mailworker
  mailworker:
    build: .
    entrypoint: ["/app/mailworker"]
    environment:
      DATABASE_URL: postgres://recruit:recruit@db:5432/recruit?sslmode=disable
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_BATCH_LIMIT: ${MAIL_BATCH_LIMIT:-50}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools
